# GitHub Actions — runs process_reviews.py every Monday at 6am UTC
# Also runs manually from GitHub UI (Actions tab → Run workflow)
# Free tier: ~2000 min/month — this job takes ~8 min = ~32 min/month

name: Weekly Sentiment Processing

on:
  schedule:
    - cron: '0 6 * * 1'    # Every Monday 06:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          nltk.download('punkt')
          nltk.download('punkt_tab')
          nltk.download('wordnet')
          "

      - name: Run sentiment processing
        env:
          SHEET_ID:        ${{ secrets.SHEET_ID }}
          RAW_GID:         ${{ secrets.RAW_GID }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python src/process_reviews.py

      - name: Done
        run: echo "Processing complete — check your Google Sheet processed tab"
